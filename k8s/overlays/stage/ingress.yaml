apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stage-ingress
  namespace: stage
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /stage
            pathType: Prefix
            backend:
              service:
                name: stage-demo-app
                port:
                  number: 80	  
